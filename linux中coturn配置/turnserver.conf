# Minimal coturn config for local testing
listening-port=3478
listening-ip=0.0.0.0
fingerprint
lt-cred-mech
realm=turn.local
server-name=coturn-local

# Static user for testing: username: turnuser  password: turnpassword
user=turnuser:turnpassword

# Reduce verbosity in production; keep verbose for testing
verbose

# Prevent multicast peers
no-multicast-peers

# Optional: uncomment and set your external public IP if needed
# If the TURN server is behind NAT, set a public/private mapping so relay
# addresses and permissions use the correct external address. Replace the
# values below if your host IPs differ.
external-ip=202.113.185.176/172.24.155.240
